name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate release
        run: npm run release:check

  release:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: npm run dist:win
            files: |
              release/BlinkCode-Setup-*.exe
              release/BlinkCode-Setup-*.exe.blockmap
              release/BlinkCode-Portable-*.exe
              release/latest.yml
          - os: macos-latest
            build: npm run dist:mac
            files: |
              release/BlinkCode-*.dmg
              release/BlinkCode-*.zip
              release/latest-mac.yml
          - os: ubuntu-latest
            build: npm run dist:linux
            files: |
              release/BlinkCode-*.AppImage
              release/BlinkCode-*.deb
              release/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        run: node scripts/release/validate-release.mjs

      - name: Build desktop packages
        run: ${{ matrix.build }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ matrix.files }}
